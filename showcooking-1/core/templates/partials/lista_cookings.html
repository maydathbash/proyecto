<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    <title>Lista de Cookings</title>
</head>
<body>
    <div class="container">
        <h1>Lista de Cookings</h1>
        <div class="cooking-list">
            {% for cooking in cookings %}
                <div class="cooking-item">
                    <h2>{{ cooking.nombre }}</h2>
                    <img src="{{ cooking.imagen.url }}" alt="{{ cooking.nombre }}">
                    <p>{{ cooking.descripcion }}</p>
                    <a href="{% url 'detalle_showcooking' cooking.id %}">Ver Detalles</a>
                </div>
            {% empty %}
                <p>No hay cookings disponibles en este momento.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
