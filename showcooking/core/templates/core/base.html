<!doctype html>
<html lang="es">
    <head>

        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->

        {% load static %}
        <link rel="stylesheet" href="{% static '/css/base.css' %}?v=2"/>

    <body>
        <header class="">
            <div class="grid-tres-columnas paddingy">
                <img src="{% static 'img/cifpcuencanro1.png' %}" class="imagen-nav" alt="">

            </div>
            <div class="grid-4-columnas fondo-naranja hd-2 paddingy">
                <div class="uno-gr horizontal a-blancos">
                    <a href="" class="p">Index</a>
                    <a href="" class="">Recetas</a>
                </div>
                <div class="especifico-gr horizontal " >
                    <a href="" class=""></a>
                </div>
                
            </div>
        </header>
        <main>
            {% block content %}
            {% endblock %}
        </main>
        <br><br>

        <footer class="fondo-gris paddingy">
                <div class="c pt-4">© 2021 - 2023 CIFP Nº 1 | Fuensanta, 3 - 16002 - Cuenca</div>
                <div class="edu">16010042.cifppu@educastillalamancha.es</div>
                <div class="pic">
                    <img src="{% static 'img/UnionEuropea.png' %}" alt="">

                    <img src="{% static 'img/MinisterioDeEducacónFormacionProfesionalYDeportes.jpg' %}" alt="">

            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
