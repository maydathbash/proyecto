{% for cooking in busqueda %}
    <div class="col-sm-6 col-md-4 col-lg-3">

    <div class="card cooking-card h-100">

      <!-- Imagen -->
      <div class="card-img-wrapper">
        <a href="{% url 'detalle_showcooking' cooking.id %}">
          <img src="{{ cooking.imagen.url }}" alt="{{ cooking.titulo }}">
        </a>

        <span class="badge bg-dark position-absolute top-0 end-0 m-2">
          ⭐ {{ cooking.avg_rating|floatformat:1 }}
        </span>
      </div>

      <!-- Contenido -->
      <div class="card-body d-flex flex-column">

        <h6 class="card-title text-capitalize mb-1">
          {{ cooking.titulo }}
        </h6>

        <small class="text-muted mb-2">
          <i class="far fa-clock me-1"></i>
          {{ cooking.fecha_creacion|date:"d M Y" }}
        </small>

        <p class="card-text small text-muted mb-3">
          {{ cooking.descripcion|truncatewords:14 }}
        </p>

      </div>

    </div>

  </div>
{% empty %}
    <div class="col-12 text-center py-5">
      <p class="lead text-muted">No se encontraron resultados.</p>
    </div>
{% endfor %}
